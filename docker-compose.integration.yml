# Tier-2 integration stack. Non-default host ports (15433, 19000) to avoid
# colliding with continuo's own dev stack on this machine.
services:
  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 30

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: continuo
      POSTGRES_PASSWORD: continuo
      POSTGRES_DB: warehouse
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U continuo -d warehouse"]
      interval: 2s
      timeout: 2s
      retries: 30
