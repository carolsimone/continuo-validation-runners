name: publish
on:
  push:
    tags: ["postgres-v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish-postgres:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: version
        run: echo "version=${GITHUB_REF_NAME#postgres-v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: adapters/postgres/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/carolsimone/validation-runner-postgres:${{ steps.version.outputs.version }}
            ghcr.io/carolsimone/validation-runner-postgres:latest
