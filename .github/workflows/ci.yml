name: ci
on:
  push:
    branches: [main]
  pull_request:

# Temporary until continuo-validation-contract is published to real PyPI: adds
# TestPyPI as an extra index (alongside real PyPI) so the pin
# continuo-validation-contract==0.1.0 resolves while psycopg2-binary/boto3/etc.
# still come from real PyPI. unsafe-best-match is required because some dev
# tools (e.g. mypy) also publish test releases on TestPyPI under the same
# name; uv's default first-index-wins strategy would otherwise fail to find
# the pinned mypy version once TestPyPI is added.
env:
  UV_EXTRA_INDEX_URL: https://test.pypi.org/simple/
  UV_INDEX_STRATEGY: unsafe-best-match

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages --all-groups
      - run: uv run ruff check postgres
      - run: uv run mypy postgres/continuo_validation_postgres

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages --all-groups
      - run: uv run pytest postgres/tests -m "not integration" -v

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages --all-groups
      - run: docker compose -p validation-runners-it -f docker-compose.integration.yml up -d --wait
      - run: uv run pytest postgres/tests -m integration -v
      - if: always()
        run: docker compose -p validation-runners-it -f docker-compose.integration.yml down -v
