name: ci
on:
  push:
    branches: [main]
  pull_request:

# continuo-validation-contract resolves from an EXPLICIT TestPyPI index scoped to
# that one package (see the root pyproject's [tool.uv.index]/[tool.uv.sources]); the
# lockfile pins it. Everything else keeps its real-PyPI wheels — no blanket
# extra-index env is needed. Drop the pyproject block once the contract is on PyPI.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages --all-groups
      - run: uv run ruff check postgres
      - run: uv run mypy postgres/continuo_validation_postgres

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages --all-groups
      - run: uv run pytest postgres/tests -m "not integration" -v

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages --all-groups
      - run: docker compose -p validation-runners-it -f docker-compose.integration.yml up -d --wait
      - run: uv run pytest postgres/tests -m integration -v
      - if: always()
        run: docker compose -p validation-runners-it -f docker-compose.integration.yml down -v
